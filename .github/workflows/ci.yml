name: CI

on:
  pull_request:
    branches: [main]

# Minimal permissions — no write access needed for CI checks
permissions:
  contents: read

# Cancel in-progress runs for the same PR to save runner minutes
concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true


jobs:
  ci:
    name: Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
